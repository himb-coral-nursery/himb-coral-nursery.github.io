<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | HIMB</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preload" as="video" href="/assets/videos/hero-zoom.mp4" type="video/mp4">
  <style>
    @font-face {
      font-family: 'Nursery-Heading';
      src: url('{{ "/fonts/heading-font.otf" | relative_url }}') format('opentype');
      font-weight: bold;
    }
    @font-face {
      font-family: 'Nursery-Body';
      src: url('{{ "/fonts/body-font.ttf" | relative_url }}') format('truetype');
      font-weight: normal;
    }
  </style>
</head>
<body class="{% if page.url == '/' %}homepage{% elsif page.url contains 'research' %}research-page{% elsif page.url contains 'facilities' %}facilities-page{% endif %}">

  <header class="main-header">
    <div class="nav-container">
      <a href="/" class="logo">HIMB CORAL NURSERY</a>
      
      <!-- Hamburger Icon (hidden on desktop) -->
      <button class="hamburger" aria-label="Toggle menu" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </button>
      
      <nav class="nav-menu" id="navMenu">
        <ul class="nav-links">
          <li><a href="/#about">About</a></li>
          <li class="dropdown">
            <a href="/facilities">Facilities</a>
            <ul class="dropdown-menu">
              <li><a href="/facilities/#the-nursery">The Nursery</a></li>
              <li><a href="/facilities/#the-corals">The Corals</a></li>
              <li><a href="/facilities/#equipment">Equipment</a></li>
              <li><a href="/facilities/#services">Services</a></li>
            </ul>
          </li>
          <li><a href="/research">Research</a></li>
          <li><a href="/contact">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>
  
  {{ content }}
  
  <script>
    // Toggle hamburger menu
    function toggleMenu() {
      const hamburger = document.querySelector('.hamburger');
      const navMenu = document.getElementById('navMenu');
      
      hamburger.classList.toggle('active');
      navMenu.classList.toggle('active');
    }
    
    document.addEventListener('DOMContentLoaded', function() {
      
      // Mobile dropdown: tap to expand inline
      document.querySelectorAll('.dropdown > a').forEach(parent => {
        parent.addEventListener('click', (e) => {
          if (window.innerWidth <= 767) {
            e.preventDefault();
            parent.parentElement.classList.toggle('open');
          }
        });
      });
      
      // Close menu when clicking a link (except dropdown parents on mobile)
      document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', () => {
          const isDropdownParent = link.parentElement.classList.contains('dropdown');
          
          // Don't close if it's a dropdown parent on mobile (it's toggling the submenu)
          if (isDropdownParent && window.innerWidth <= 767) return;
          
          // Close hamburger menu
          document.querySelector('.hamburger').classList.remove('active');
          document.getElementById('navMenu').classList.remove('active');
          
          // Close any open dropdowns
          document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
        });
      });
      
    });
  </script>
<footer class="site-footer">
  <div class="footer-content">
    <div class="footer-left">
      <p>Managed by <a href="https://www.tobolab.org/" target="_blank">ToBo Lab</a> at HIMB</p>
    </div>
    <div class="footer-center">
      <p>&copy; 2026 HIMB Coral Nursery</p>
    </div>
    <div class="footer-right">
      <a href="https://instagram.com/himb_coralnursery" target="_blank" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
        </svg>
      </a>
      <a href="https://www.himb.hawaii.edu/research/facilities/coral-nursery/" target="_blank" aria-label="HIMB website">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="2" y1="12" x2="22" y2="12"></line>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
        </svg>
      </a>
      <a href="/contact" aria-label="Contact">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
          <polyline points="22,6 12,13 2,6"></polyline>
        </svg>
      </a>
    </div>
  </div>
</footer>
</body>
</html>
